name: Resolve Sync Conflicts

on:
  workflow_run:
    workflows: ["Sync Upstream Repository"]
    types: [completed]

jobs:
  resolve-conflicts:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"

    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/ahmedtolba481/GlOBALSTAY.git || true

    - name: Fetch upstream changes
      run: |
        git fetch upstream

    - name: Create conflict resolution branch
      run: |
        git checkout -b sync-conflict-resolution-$(date +%Y%m%d-%H%M%S)

    - name: Attempt merge with conflict resolution
      run: |
        git checkout main
        git merge upstream/main --no-edit || true

    - name: Check for conflicts
      id: check-conflicts
      run: |
        if git diff --name-only --diff-filter=U | grep -q .; then
          echo "conflicts=true" >> $GITHUB_OUTPUT
          echo "Conflicted files:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only --diff-filter=U >> $GITHUB_STEP_SUMMARY
        else
          echo "conflicts=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request for conflicts
      if: steps.check-conflicts.outputs.conflicts == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: pr } = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🔄 Sync Conflict Resolution Required',
            head: 'sync-conflict-resolution-' + new Date().toISOString().slice(0,19).replace(/:/g, '-'),
            base: 'main',
            body: `## ⚠️ Sync Conflicts Detected
            
            The automatic sync from upstream repository encountered conflicts that need manual resolution.
            
            **Conflicted files:**
            ${process.env.CONFLICTED_FILES || 'Check the workflow logs for details'}
            
            **Please:**
            1. Review the conflicts
            2. Resolve them manually
            3. Merge this PR when ready
            
            This will ensure your fork stays up to date with the upstream repository.`
          });
          
          console.log('Created PR:', pr.html_url);
